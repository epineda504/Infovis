<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajos de Infovis</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

html{
  scroll-behavior:smooth;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  background-color:#f5f6fa;
  margin:0;
  padding:0;
}

/* HEADER */

header{
  background:white;
  text-align:center;
  padding:25px 0 15px 0;
  border-bottom:4px solid #14249C;
}

header h1{
  margin:0;
  font-size:28px;
  letter-spacing:1px;
}

/* MENU */

.menu{
  background:#14249C;
  padding:14px 25px;
  text-align:center;
  margin:25px auto;
  max-width:520px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.menu a{
  color:white;
  margin:0 20px;
  text-decoration:none;
  font-weight:bold;
  font-size:15px;
}

.menu a:hover{
  text-decoration:underline;
}

/* CONTENIDO */

.container{
  max-width:1400px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:white;
  padding:25px;
  margin-bottom:40px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
  
.top-btn{
  position:fixed;
  bottom:20px;
  right:10px;
  background:#14249C;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  text-decoration:none;
  font-size:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

.top-btn:hover{
  background:#374151;
  transform:scale(1.1);
}

h2{
  margin-top:0;
  margin-bottom:20px;
  color:#333;
}

.visualization{
  width:100%;
  display:flex;
  justify-content:center;
}

object{
  width:100%;
  max-width:1000px;
}

.flourish-embed{
  width:100%;
}

</style>

</head>

<body>

<header>
<h1>Eduardo Pineda</h1>
<p>CD.06 Visualización de la Información</p>
</header>

<!-- MENU DE NAVEGACIÓN -->

<nav class="menu">
<a href="#raw">Raw Graphs</a>
<a href="#florence">Florence Nightingales</a>
</nav>

<div class="container">

<!-- PRIMERA VISUALIZACIÓN -->

<div class="card" id="raw">
<h2>Raw Graphs</h2>

<div class="visualization">
<object data="./Image.svg" type="image/svg+xml"></object>
</div>

</div>

<!-- SEGUNDA VISUALIZACIÓN -->

<div class="card" id="florence">
<h2>Florence Nightingales</h2>

<div class="visualization">
<div class="flourish-embed flourish-chart" data-src="visualisation/27939096">
<noscript>
<img src="https://public.flourish.studio/visualisation/27939096/thumbnail" width="100%" alt="visualization">
</noscript>
</div>
</div>

</div>

</div>

<script src="https://public.flourish.studio/resources/embed.js"></script>

<!-- BOTON PARA SUBIR -->
 <a href="#" class="top-btn">↑ Menu</a> 
</body>
</html>
