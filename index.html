<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  background-color:#f5f6fa;
  margin:0;
  padding:0;
}

/* HEADER */

header{
  background:white;
  text-align:center;
  padding:25px 0 15px 0;
  border-bottom:4px solid #444; /* línea gris oscura */
}

header h1{
  margin:0;
  font-size:28px;
  letter-spacing:1px;
}

/* CONTENIDO */

.container{
  max-width:1400px;
  margin:auto;
  padding:40px 20px;
}

.page-title{
  text-align:center;
  margin-bottom:40px;
}

.card{
  background:white;
  padding:25px;
  margin-bottom:40px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
  margin-bottom:20px;
  color:#333;
}

.visualization{
  width:100%;
  display:flex;
  justify-content:center;
}

object{
  width:100%;
  max-width:800px;
}

.flourish-embed{
  width:100%;
}

</style>

</head>

<body>

<header>
  <h1>Eduardo Pineda</h1>
  <p>CD.06 Visualización de la Información</p>
</header>

<div class="container">
  
<div class="card">
<h2>Raw Graphs</h2>

<div class="visualization">
<object data="./Image.svg" type="image/svg+xml"></object>
</div>

</div>

<div class="card">
<h2>Florence Nightingales</h2>

<div class="visualization">
<div class="flourish-embed flourish-chart" data-src="visualisation/27939096">
<noscript>
<img src="https://public.flourish.studio/visualisation/27939096/thumbnail" width="100%" alt="visualization">
</noscript>
</div>
</div>

</div>

</div>

<script src="https://public.flourish.studio/resources/embed.js"></script>

</body>
</html>
