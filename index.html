<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajos de Infovis</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

html{
  scroll-behavior:smooth;
}

/* VARIABLES DE COLOR */

:root{
  --bg:#f5f6fa;
  --card:#ffffff;
  --text:#333;
  --header:#ffffff;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --header:#1e293b;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  background-color:var(--bg);
  color:var(--text);
  margin:0;
  padding:0;
}

/* HEADER */

header{
  background:var(--header);
  text-align:center;
  padding:25px 0 15px 0;
  border-bottom:4px solid #14249C;
  position:relative;
}

header h1{
  margin:0;
  font-size:28px;
  letter-spacing:1px;
}

/* BOTON TEMA */

#theme-toggle{
  position:absolute;
  top:20px;
  right:20px;
  border:none;
  background:#e5e7eb;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* MENU */

.menu{
  background:#14249C;
  padding:14px 25px;
  text-align:center;
  margin:25px auto;
  max-width:520px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.menu a{
  color:white;
  margin:0 20px;
  text-decoration:none;
  font-weight:bold;
  font-size:15px;
}

.menu a:hover{
  text-decoration:underline;
}

/* CONTENIDO */

.container{
  max-width:1400px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:var(--card);
  padding:25px;
  margin-bottom:40px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
  
.top-btn{
  position:fixed;
  bottom:20px;
  right:3px;
  background:#14249C;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  text-decoration:none;
  font-size:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

.top-btn:hover{
  background:#374151;
  transform:scale(1.1);
}

h2{
  margin-top:0;
  margin-bottom:20px;
  color:var(--text);
}

.visualization{
  width:100%;
  display:flex;
  justify-content:center;
}

object{
  width:100%;
  max-width:1000px;
}

.flourish-embed{
  width:100%;
}

</style>

</head>

<body>

<header>
<h1>Eduardo Pineda</h1>
<p>CD.06 Visualización de la Información</p>
<button id="theme-toggle">🌙</button>
</header>

<!-- MENU DE NAVEGACIÓN -->

<nav class="menu">
<a href="#raw">Raw Graphs</a>
<a href="#florence">Florence Nightingales</a>
<a href="#datawrapper">Data Wrapper</a>
</nav>

<div class="container">

<!-- PRIMERA VISUALIZACIÓN -->

<div class="card" id="raw">
<h2>Raw Graphs</h2>

<div class="visualization">
<object data="./Image.svg" type="image/svg+xml"></object>
</div>

</div>

<!-- SEGUNDA VISUALIZACIÓN -->

<div class="card" id="florence">
<h2>Florence Nightingales</h2>

<div class="visualization">
<div class="flourish-embed flourish-chart" data-src="visualisation/27939096">
<noscript>
<img src="https://public.flourish.studio/visualisation/27939096/thumbnail" width="100%" alt="visualization">
</noscript>
</div>
</div>

</div>

</div>

<script src="https://public.flourish.studio/resources/embed.js"></script>

<!-- TERCERA VISUALIZACIÓN -->

<div class="card" id="datawrapper">
<h2>Data Wrapper</h2>

<div class="visualization">

<iframe title="Men vs Women: Pizza topping choices"
src="https://datawrapper.dwcdn.net/a5yCP/1/"
scrolling="no"
frameborder="0"
style="width:0; min-width:100% !important; border:none;"
height="462">
</iframe>

</div>
</div>

<script>
window.addEventListener("message",function(e){
if(void 0!==e.data["datawrapper-height"]){
var iframes=document.querySelectorAll("iframe");
for(var chartId in e.data["datawrapper-height"]){
for(var i=0;i<iframes.length;i++){
if(iframes[i].contentWindow===e.source){
iframes[i].style.height=e.data["datawrapper-height"][chartId]+"px";
}
}
}
}
});
</script>

  
<!-- BOTON PARA SUBIR -->
<a href="#" class="top-btn">↑ Menu</a>

<script>

const button = document.getElementById("theme-toggle");

button.onclick = () => {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
