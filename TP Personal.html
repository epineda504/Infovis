<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buccaneers Dashboard</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --primary: #d50a0a;
    }

    body.dark {
      --bg: #121212;
      --text: #f1f1f1;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: var(--primary);
      padding: 20px;
      box-sizing: border-box;
      transform: translateX(0);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    /* LOGO */
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      width: 100px;
    }

    /* BOTONES */
    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: #333;
    }

    /* BOTÓN SIDEBAR */
    .toggle-sidebar {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 8px;
      z-index: 1100;
      font-size: 16px;
    }

    /* BOTÓN DARK */
    .toggle-dark {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      border: none;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
    }

    /* MAIN */
    .main {
      padding: 40px;
      transition: margin-left 0.3s ease;
    }

    .main.shifted {
      margin-left: 220px;
    }

    h1 {
      color: var(--primary);
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <!-- BOTONES -->
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
  <button class="toggle-dark" onclick="toggleMode()">🌙</button>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="logo-container">
      <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/Tampa_Bay_Buccaneers_logo.svg" alt="Bucs Logo">
    </div>

    <button onclick="changeContent('home')">Inicio</button>
    <button onclick="changeContent('team')">Equipo</button>
    <button onclick="changeContent('stats')">Stats</button>
  </div>

  <!-- CONTENIDO -->
  <div class="main shifted">
    <div id="content">
      <h1>Dashboard Buccaneers</h1>
      <p>Bienvenido al sistema de análisis del equipo.</p>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main = document.querySelector('.main');

      sidebar.classList.toggle('hidden');
      main.classList.toggle('shifted');
    }

    function toggleMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    // Mantener modo oscuro
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    function changeContent(section) {
      const content = document.getElementById('content');

      if (section === 'home') {
        content.innerHTML = `
          <h1>Dashboard Buccaneers</h1>
          <p>Bienvenido al sistema de análisis del equipo.</p>
        `;
      }

      if (section === 'team') {
        content.innerHTML = `
          <h1>Equipo</h1>
          <p>Información del roster de los Tampa Bay Buccaneers.</p>
        `;
      }

      if (section === 'stats') {
        content.innerHTML = `
          <h1>Estadísticas</h1>
          <p>Aquí podrás visualizar métricas del equipo.</p>
        `;
      }
    }
  </script>

</body>
</html>
