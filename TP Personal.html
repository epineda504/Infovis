<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buccaneers Dashboard</title>
  <link rel="icon" type="image/png" href="https://www.clipartmax.com/png/small/195-1958753_tampa-bay-buccaneers-logo-png.png">

<style>
  :root {
    --bg: #ffffff;
    --text: #111;
    --primary: #d50a0a;

    --card-bg: #f5f5f5;
    --card-text: #111;
    --card-secondary: #555;
    --card-border: #ddd;
  }

  body.dark {
    --bg: #121212;
    --text: #f1f1f1;

    --card-bg: #1a1d23;
    --card-text: #f1f1f1;
    --card-secondary: #aaa;
    --card-border: #2a2e36;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100vh;
    background: var(--primary);
    padding: 20px;
    box-sizing: border-box;
    transform: translateX(0);
    transition: transform 0.3s ease;
    z-index: 1000;

    display: flex;
    flex-direction: column;
  }

  .sidebar.hidden {
    transform: translateX(-100%);
  }

  /* LOGO */
  .logo-container {
    text-align: center;
    margin-bottom: 20px;
  }

  .logo-container img {
    width: 100px;
  }

  /* BOTONES */
  .sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
  }

  .sidebar button:hover {
    background: #333;
  }

  /* LINK GITHUB */
  .sidebar a.github-link {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    text-align: center;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .sidebar a.github-link:hover {
    background: #333;
  }

  .spacer {
    flex-grow: 1;
  }

  /* BOTÓN SIDEBAR */
  .toggle-sidebar {
    position: fixed;
    top: 20px;
    left: 20px;
    background: var(--primary);
    border: none;
    color: white;
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 8px;
    z-index: 1100;
    font-size: 16px;
  }

  /* BOTÓN DARK */
  .toggle-dark {
    position: fixed;
    top: 20px;
    right: 20px;
    background: black;
    color: white;
    border: none;
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
  }

  /* MAIN */
  .main {
    padding: 40px;
    transition: margin-left 0.3s ease;
  }

  .main.shifted {
    margin-left: 220px;
  }

  h1 {
    color: var(--primary);
    margin-top: 60px;
  }

  /* =========================
     GAME CARD (MEJORADO)
  ========================= */
  .game-card {
    background: var(--card-bg);
    padding: 14px 18px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    transition: all 0.25s ease;
    will-change: transform;
  }

  /* 🔥 HOVER PRO */
  .game-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    border-color: rgba(0,0,0,0.15);
  }

  /* ✨ Glow rojo en dark mode */
  body.dark .game-card:hover {
    box-shadow: 0 0 25px rgba(213, 10, 10, 0.4);
    border-color: rgba(213, 10, 10, 0.3);
  }

  /* 💥 Micro-interacción en score */
  .game-card:hover .score {
    transform: scale(1.1);
    transition: 0.2s;
  }

  /* =========================
     GAME ROW
  ========================= */
  .game-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--card-text);
  }

  .team.away {
    justify-content: flex-end;
  }

  /* =========================
     SCORE
  ========================= */
  .score {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .score span {
    padding: 4px 8px;
    border-radius: 6px;
  }

  .win {
    color: #22c55e;
    background: rgba(34,197,94,0.12);
  }

  .loss {
    color: #ef4444;
    background: rgba(239,68,68,0.12);
  }

  /* =========================
     META
  ========================= */
  .game-meta {
    text-align: center;
    font-size: 11px;
    color: var(--card-secondary);
    margin-top: 6px;
  }
</style>


</head>

<body>

  <!-- BOTONES -->
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
  <button class="toggle-dark" onclick="toggleMode()">🌙</button>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="logo-container">
      <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/Tampa_Bay_Buccaneers_logo.svg" alt="Bucs Logo">
    </div>

    <button onclick="changeContent('home')">Catálogo</button>
    <button onclick="changeContent('team')">Gráficos</button>
    <button onclick="changeContent('stats')">Estadísticas</button>

    <div class="spacer"></div> <!--empuja hacia abajo -->

    <!-- LINK A GITHUB -->
    <a class="github-link" href="https://github.com/epineda504/Infovis" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="18" style="vertical-align: middle; margin-right: 8px;">
      GitHub Repo
    </a>

  </div>

  <!-- CONTENIDO -->
  <div class="main shifted">
    <div id="content">
      <h1>Dashboard Buccaneers</h1>
      <p>Bienvenido al sistema de análisis del equipo.</p>
    </div>
  </div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.querySelector('.main');

    sidebar.classList.toggle('hidden');
    main.classList.toggle('shifted');
  }

  function toggleMode() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', isDark);
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 🔥 FORZAR modo claro siempre
    document.body.classList.remove('dark');
    localStorage.setItem('darkMode', 'false');
  });

  function changeContent(section) {
    const content = document.getElementById('content');


    if (section === 'home') {
      content.innerHTML = `
        <h1>Tampa Bay Buccaneers</h1>
        <p>Información de los datos utilizados en este TP.</p>
      `;
      return;
    }

    if (section === 'team') {
      content.innerHTML = `
        <h1>Tampa Bay Buccaneers</h1>
        <p>Analisis sobre el rendimiento del equipo.</p>
      `;
      return;
    }

    if (section === 'stats') {

      const games = [
        ["Tampa Bay Buccaneers","Washington Commanders",20,23,"Jan 12, 2025 | Wildcard","tb","wsh"],
        ["Detroit Lions","Tampa Bay Buccaneers",31,23,"Jan 21, 2024 | Division","det","tb"],
        ["Tampa Bay Buccaneers","Philadelphia Eagles",32,9,"Jan 15, 2024 | Wildcard","tb","phi"],
        ["Tampa Bay Buccaneers","Dallas Cowboys",14,31,"Jan 16, 2023 | Wildcard","tb","dal"],
        ["Tampa Bay Buccaneers","Los Angeles Rams",27,30,"Jan 23, 2022 | Division","tb","lar"],
        ["Tampa Bay Buccaneers","Philadelphia Eagles",31,15,"Jan 16, 2022 | Wildcard","tb","phi"],
        ["Tampa Bay Buccaneers","Kansas City Chiefs",31,9,"Feb 07, 2021 | Superbowl","tb","kc"],
        ["Green Bay Packers","Tampa Bay Buccaneers",26,31,"Jan 24, 2021 | Conference","gb","tb"],
        ["New Orleans Saints","Tampa Bay Buccaneers",20,30,"Jan 17, 2021 | Division","no","tb"],
        ["Washington Football Team","Tampa Bay Buccaneers",23,31,"Jan 09, 2021 | Wildcard","wsh","tb"],
        ["Tampa Bay Buccaneers","New York Giants",14,24,"Jan 06, 2008 | Wildcard","tb","nyg"],
        ["Tampa Bay Buccaneers","Washington Redskins",10,17,"Jan 07, 2006 | Wildcard","tb","wsh"],
        ["Oakland Raiders","Tampa Bay Buccaneers",21,48,"Jan 26, 2003 | Superbowl","lv","tb"],
        ["Philadelphia Eagles","Tampa Bay Buccaneers",10,27,"Jan 19, 2003 | Conference","phi","tb"],
        ["Tampa Bay Buccaneers","San Francisco 49ers",31,6,"Jan 12, 2003 | Division","tb","sf"],
        ["Philadelphia Eagles","Tampa Bay Buccaneers",31,9,"Jan 12, 2002 | Wildcard","phi","tb"],
        ["Philadelphia Eagles","Tampa Bay Buccaneers",21,3,"Dec 31, 2000 | Wildcard","phi","tb"],
        ["St. Louis Rams","Tampa Bay Buccaneers",11,6,"Jan 23, 2000 | Conference","lar","tb"],
        ["Tampa Bay Buccaneers","Washington Redskins",14,13,"Jan 15, 2000 | Division","tb","wsh"],
        ["Green Bay Packers","Tampa Bay Buccaneers",21,7,"Jan 04, 1998 | Division","gb","tb"],
        ["Tampa Bay Buccaneers","Detroit Lions",20,10,"Dec 28, 1997 | Wildcard","tb","det"],
        ["Dallas Cowboys","Tampa Bay Buccaneers",30,17,"Jan 09, 1983 | Wildcard","dal","tb"],
        ["Dallas Cowboys","Tampa Bay Buccaneers",38,0,"Jan 02, 1982 | Division","dal","tb"],
        ["Tampa Bay Buccaneers","Los Angeles Rams",0,9,"Jan 06, 1980 | Conference","tb","lar"],
        ["Tampa Bay Buccaneers","Philadelphia Eagles",24,17,"Dec 29, 1979 | Division","tb","phi"]
      ];

      let wins = 0;
      let losses = 0;
      let streak = 0;
      let lastResult = null;
      let superBowls = 0;

      const gamesHTML = games.map(g => {
        const homeLogo = `https://a.espncdn.com/i/teamlogos/nfl/500/${g[5]}.png`;
        const awayLogo = `https://a.espncdn.com/i/teamlogos/nfl/500/${g[6]}.png`;

        const isTBHome = g[0] === "Tampa Bay Buccaneers";
        const tbScore = isTBHome ? g[2] : g[3];
        const oppScore = isTBHome ? g[3] : g[2];

        const tbWin = tbScore > oppScore;

        // stats
        if (tbWin) wins++;
        else losses++;

        // streak
        if (lastResult === null || lastResult === tbWin) {
          streak++;
        } else {
          streak = 1;
        }
        lastResult = tbWin;

        // Super Bowl wins
        const isSuperBowl = g[4].includes("Superbowl");
        if (isSuperBowl && tbWin) {
          superBowls++;
        }

        const badge = isSuperBowl ? "🏆" : "";

        return `
          <div class="game-card">

            <div class="game-row">

              <div class="team">
                <img src="${homeLogo}" width="28">
                <span>${g[0]}</span>
              </div>

              <div class="score">
                <span class="${isTBHome ? (tbWin ? 'win' : 'loss') : ''}">
                  ${g[2]}
                </span>
                <span style="color:var(--card-text);">-</span>
                <span class="${!isTBHome ? (tbWin ? 'win' : 'loss') : ''}">
                  ${g[3]}
                </span>
              </div>

              <div class="team away">
                <span>${g[1]}</span>
                <img src="${awayLogo}" width="28">
              </div>

            </div>

            <div class="game-meta">
              ${badge} ${g[4]}
            </div>

          </div>
        `;
      }).join("");

      const totalGames = wins + losses;
      const winPct = ((wins / totalGames) * 100).toFixed(1);

      const streakText = lastResult
        ? `🔥 ${streak}W`
        : `❄️ ${streak}L`;

      content.innerHTML = `
        <h1>Tampa Bay Buccaneers</h1>

        <div style="
          display:flex;
          gap:20px;
          margin:20px 0;
          flex-wrap:wrap;
        ">

          <div class="game-card">
            <strong>Record</strong>
            <div style="display:flex; gap:10px; margin-top:5px; align-items:center;">
              <span style="color:#22c55e; font-weight:600;">${wins} W</span>
              <span style="color:var(--card-text);">-</span>
              <span style="color:#ef4444; font-weight:600;">${losses} L</span>
            </div>
          </div>

          <div class="game-card">
            <strong>Win %</strong>
            <div>${winPct}%</div>
          </div>

          <div class="game-card">
            <strong>Streak</strong>
            <div>${streakText}</div>
          </div>

          <div class="game-card">
            <strong>Super Bowls</strong>
            <div style="
              margin-top:6px;
              font-size:18px;
              font-weight:600;
              color:#ffd700;
            ">
              🏆 ${superBowls}
            </div>
          </div>

        </div>

        <div style="
          background:var(--card-bg);
          padding:20px;
          border-radius:12px;
        ">

          <div style="
            display:grid;
            grid-template-columns: 1fr auto 1fr;
            padding: 10px;
            font-weight:bold;
            border-bottom:1px solid var(--card-border);
            text-transform:uppercase;
            color:var(--card-text);
          ">
            <div>Home</div>
            <div style="text-align:center;">Score</div>
            <div style="text-align:right;">Away</div>
          </div>

          ${gamesHTML}
        </div>
      `;
    }
  }
</script>

</body>
</html>
