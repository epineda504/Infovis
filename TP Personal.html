<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buccaneers Dashboard</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --primary: #d50a0a;
      --secondary: #0a0a0a;
    }

    body.dark {
      --bg: #121212;
      --text: #f1f1f1;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: var(--primary);
      color: white;
      transition: 0.3s;
      padding: 20px;
      box-sizing: border-box;
    }

    .sidebar.collapsed {
      width: 70px;
    }

    /* LOGO */
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      width: 100px;
      transition: 0.3s;
    }

    .sidebar.collapsed .logo-container img {
      width: 40px;
    }

    /* BOTONES */
    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar button:hover {
      background: gray;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-sidebar {
      background: var(--primary);
      border: none;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    .toggle-dark {
      background: black;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    h1 {
      color: var(--primary);
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    
    <div class="logo-container">
      <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/Tampa_Bay_Buccaneers_logo.svg" alt="Bucs Logo">
    </div>

    <button onclick="changeContent('home')">Inicio</button>
    <button onclick="changeContent('team')">Equipo</button>
    <button onclick="changeContent('stats')">Stats</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    
    <div class="topbar">
      <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
      <button class="toggle-dark" onclick="toggleMode()">🌙 / ☀️</button>
    </div>

    <div id="content">
      <h1>Dashboard Buccaneers</h1>
      <p>Bienvenido al sistema de análisis.</p>
    </div>

  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function toggleMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    // Mantener modo oscuro al recargar
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    function changeContent(section) {
      const content = document.getElementById('content');

      if (section === 'home') {
        content.innerHTML = `
          <h1>Dashboard Buccaneers</h1>
          <p>Bienvenido al sistema de análisis del equipo.</p>
        `;
      }

      if (section === 'team') {
        content.innerHTML = `
          <h1>Equipo</h1>
          <p>Información del roster de los Tampa Bay Buccaneers.</p>
        `;
      }

      if (section === 'stats') {
        content.innerHTML = `
          <h1>Estadísticas</h1>
          <p>Aquí podrás visualizar métricas del equipo.</p>
        `;
      }
    }
  </script>

</body>
</html>
