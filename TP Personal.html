<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buccaneers Dashboard</title>
  <link rel="icon" type="image/png" href="https://www.clipartmax.com/png/small/195-1958753_tampa-bay-buccaneers-logo-png.png">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --primary: #d50a0a;
    }

    body.dark {
      --bg: #121212;
      --text: #f1f1f1;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100vh;
    background: var(--primary);
    padding: 20px;
    box-sizing: border-box;
    transform: translateX(0);
    transition: transform 0.3s ease;
    z-index: 1000;

    display: flex;
    flex-direction: column;
  }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    /* LOGO */
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      width: 100px;
    }

    /* BOTONES */
    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: #333;
    }

    /* LINK GITHUB */
    .sidebar a.github-link {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      text-align: center;
      transition: 0.2s;
      box-sizing: border-box;
    }

    .sidebar a.github-link:hover {
      background: #333;
    }

    .spacer {
  flex-grow: 1; /* 👈 empuja lo de abajo hacia el fondo */
  }

    /* BOTÓN SIDEBAR */
    .toggle-sidebar {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 8px;
      z-index: 1100;
      font-size: 16px;
    }

    /* BOTÓN DARK */
    .toggle-dark {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      border: none;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
    }

    /* MAIN */
    .main {
      padding: 40px;
      transition: margin-left 0.3s ease;
    }

    .main.shifted {
      margin-left: 220px;
    }

    h1 {
      color: var(--primary);
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <!-- BOTONES -->
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
  <button class="toggle-dark" onclick="toggleMode()">🌙</button>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="logo-container">
      <img src="https://upload.wikimedia.org/wikipedia/en/a/a2/Tampa_Bay_Buccaneers_logo.svg" alt="Bucs Logo">
    </div>

    <button onclick="changeContent('home')">Catálogo</button>
    <button onclick="changeContent('team')">Equipo</button>
    <button onclick="changeContent('stats')">Estadísticas</button>

    <div class="spacer"></div> <!-- 👈 empuja hacia abajo -->

    <!-- 🔥 LINK A GITHUB -->
    <a class="github-link" href="https://github.com/epineda504/Infovis" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="18" style="vertical-align: middle; margin-right: 8px;">
      GitHub Repo
    </a>

  </div>

  <!-- CONTENIDO -->
  <div class="main shifted">
    <div id="content">
      <h1>Dashboard Buccaneers</h1>
      <p>Bienvenido al sistema de análisis del equipo.</p>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main = document.querySelector('.main');

      sidebar.classList.toggle('hidden');
      main.classList.toggle('shifted');
    }

    function toggleMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    // Mantener modo oscuro
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }

    function changeContent(section) {
      const content = document.getElementById('content');

      if (section === 'home') {
        content.innerHTML = `
          <h1>Tampa Bay Buccaneers</h1>
          <p>Bienvenido al sistema de análisis del equipo.</p>
          <p>
            Aquí podrás encontrar información sobre el catálogo de las múltiples variables utilizadas del dataset.
          </p>
        `;
      }

      if (section === 'team') {
        content.innerHTML = `
          <h1>Tampa Bay Buccaneers</h1>
          <p>Información del roster de los Tampa Bay Buccaneers.</p>
        `;
      }

      if (section === 'stats') {
        content.innerHTML = `
          <h1>Tampa Bay Buccaneers</h1>
          <p>Aquí podrás visualizar métricas del equipo.</p>

          <div style="background:#0f1115; padding:20px; border-radius:12px; margin-top:20px;">

            <div style="
              display:grid;
              grid-template-columns: 1fr auto 1fr;
              padding: 10px;
              font-weight:bold;
              border-bottom:1px solid #2a2e36;
              text-transform:uppercase;
            ">
              <div>Home</div>
              <div style="text-align:center;">Score</div>
              <div style="text-align:right;">Away</div>
            </div>

            ${[
              ["Tampa Bay Buccaneers","Washington Commanders",20,23,"Jan 12, 2025 | Wildcard","tb","wsh"],
              ["Detroit Lions","Tampa Bay Buccaneers",31,23,"Jan 21, 2024 | Division","det","tb"],
              ["Tampa Bay Buccaneers","Philadelphia Eagles",32,9,"Jan 15, 2024 | Wildcard","tb","phi"],
              ["Tampa Bay Buccaneers","Dallas Cowboys",14,31,"Jan 16, 2023 | Wildcard","tb","dal"],
              ["Tampa Bay Buccaneers","Los Angeles Rams",27,30,"Jan 23, 2022 | Division","tb","lar"],
              ["Tampa Bay Buccaneers","Philadelphia Eagles",31,15,"Jan 16, 2022 | Wildcard","tb","phi"],
              ["Tampa Bay Buccaneers","Kansas City Chiefs",31,9,"Feb 07, 2021 | Superbowl","tb","kc"],
              ["Green Bay Packers","Tampa Bay Buccaneers",26,31,"Jan 24, 2021 | Conference","gb","tb"],
              ["New Orleans Saints","Tampa Bay Buccaneers",20,30,"Jan 17, 2021 | Division","no","tb"],
              ["Washington Football Team","Tampa Bay Buccaneers",23,31,"Jan 09, 2021 | Wildcard","wsh","tb"],
              ["Tampa Bay Buccaneers","New York Giants",14,24,"Jan 06, 2008 | Wildcard","tb","nyg"],
              ["Tampa Bay Buccaneers","Washington Redskins",10,17,"Jan 07, 2006 | Wildcard","tb","wsh"],
              ["Oakland Raiders","Tampa Bay Buccaneers",21,48,"Jan 26, 2003 | Superbowl","lv","tb"],
              ["Philadelphia Eagles","Tampa Bay Buccaneers",10,27,"Jan 19, 2003 | Conference","phi","tb"],
              ["Tampa Bay Buccaneers","San Francisco 49ers",31,6,"Jan 12, 2003 | Division","tb","sf"],
              ["Philadelphia Eagles","Tampa Bay Buccaneers",31,9,"Jan 12, 2002 | Wildcard","phi","tb"],
              ["Philadelphia Eagles","Tampa Bay Buccaneers",21,3,"Dec 31, 2000 | Wildcard","phi","tb"],
              ["St. Louis Rams","Tampa Bay Buccaneers",11,6,"Jan 23, 2000 | Conference","lar","tb"],
              ["Tampa Bay Buccaneers","Washington Redskins",14,13,"Jan 15, 2000 | Division","tb","wsh"],
              ["Green Bay Packers","Tampa Bay Buccaneers",21,7,"Jan 04, 1998 | Division","gb","tb"],
              ["Tampa Bay Buccaneers","Detroit Lions",20,10,"Dec 28, 1997 | Wildcard","tb","det"],
              ["Dallas Cowboys","Tampa Bay Buccaneers",30,17,"Jan 09, 1983 | Wildcard","dal","tb"],
              ["Dallas Cowboys","Tampa Bay Buccaneers",38,0,"Jan 02, 1982 | Division","dal","tb"],
              ["Tampa Bay Buccaneers","Los Angeles Rams",0,9,"Jan 06, 1980 | Conference","tb","lar"],
              ["Tampa Bay Buccaneers","Philadelphia Eagles",24,17,"Dec 29, 1979 | Division","tb","phi"]
            ].map(g => {
              const homeLogo = `https://a.espncdn.com/i/teamlogos/nfl/500/${g[5]}.png`;
              const awayLogo = `https://a.espncdn.com/i/teamlogos/nfl/500/${g[6]}.png`;

              return `
              <div style="
                background:#1a1d23;
                padding:15px;
                margin:12px 0;
                border-radius:12px;
              ">

                <div style="
                  display:grid;
                  grid-template-columns:1fr auto 1fr;
                  align-items:center;
                ">

                  <div style="display:flex; gap:10px; align-items:center;">
                    <img src="${homeLogo}" width="32">
                    <span>${g[0]}</span>
                  </div>

                  <div style="font-size:22px; font-weight:bold;">
                    ${g[2]} - ${g[3]}
                  </div>

                  <div style="display:flex; gap:10px; align-items:center; justify-content:flex-end;">
                    <span>${g[1]}</span>
                    <img src="${awayLogo}" width="32">
                  </div>

                </div>

                <div style="text-align:center; font-size:12px; color:#aaa; margin-top:6px;">
                  ${g[4]}
                </div>

              </div>
              `;
            }).join("")}

          </div>
        `;
      }
    }
        </script>

</body>
</html>
